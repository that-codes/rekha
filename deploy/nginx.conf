# Rekha reverse-proxy example (Nginx). TLS terminates here; Rekha runs on
# 127.0.0.1:9700. Set config.trustedProxies to this proxy's IP in ~/.rekha/config.json
# so X-Forwarded-* headers are honored (correct client IPs in rate-limit + audit).

server {
    listen 443 ssl http2;
    server_name pm2.example.com;

    ssl_certificate     /etc/letsencrypt/live/pm2.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pm2.example.com/privkey.pem;

    # HSTS (Rekha leaves HSTS to the proxy).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:9700;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # WebSocket upgrade for live metrics + log streaming.
    location /ws {
        proxy_pass http://127.0.0.1:9700;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 80;
    server_name pm2.example.com;
    return 301 https://$host$request_uri;
}
