name: Release

# Publishes `rekha` to npm when a version tag (vX.Y.Z) is pushed.
# Requires repo secret NPM_TOKEN (an npm "Automation" token) and a `repository`
# field in package.json that matches this GitHub repo (for --provenance).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::Tag $TAG does not match package.json version $PKG"; exit 1; }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `npm publish` runs the `prepublishOnly` script (pnpm dist → build + bundle),
      # so the published tarball is always freshly built from source.
      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
